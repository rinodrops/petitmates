# Builtin speech lines shared by all characters.
# Layer 1 of 4 in the merge order.

[speech_display]
duration_sec = 6.0
fade_out_sec = 1.0

[[speech]]
text_ja = "なんかのんびりした気分"
text_en = "Feeling pretty lazy today..."
trigger = "random"
weight  = 1.0

[[speech]]
text_ja = "ちょっと眠い"
text_en = "A bit sleepy..."
trigger = "random"
weight  = 1.0

[[speech]]
text_ja = "今日も一日がんばろ"
text_en = "Another day, here we go."
trigger = "random"
weight  = 0.8

[[speech]]
text_ja = "なにか面白いこと、ないかな"
text_en = "I wonder if anything interesting will happen."
trigger = "random"
weight  = 0.8

[[speech]]
text_ja = "外はどんな天気かな"
text_en = "I wonder what the weather's like outside."
trigger = "random"
weight  = 0.6

[[speech]]
text_ja = "朝だ"
text_en = "Morning already."
trigger = "time"
hours   = [6, 7, 8]
weight  = 1.0

[[speech]]
text_ja = "もうそんな時間か"
text_en = "It's already that time, huh."
trigger = "time"
hours   = [20, 21, 22]
weight  = 0.8

[[speech]]
text_ja = "夜ふかしはよくないよ"
text_en = "Staying up this late isn't good for you."
trigger = "time"
hours   = [0, 1, 2, 3]
weight  = 0.8

# --- weather ---

